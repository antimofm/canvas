<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --black: #0a0a0a;
    --white: #f5f0e8;
    --cream: #ede8dc;
    --red: #d42b2b;
    --gold: #e8b84b;
    --ink: #1a1410;
    --mid: #6b5e4e;
  }

  html {
    font-size: 16px;
    scroll-behavior: smooth;
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* ─── NOISE TEXTURE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
  }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 2.5rem 3rem;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid rgba(245,240,232,0.12);
  }

  /* Diagonal stripe background */
  .hero::after {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 70%;
    height: 200%;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(212,43,43,0.04) 40px,
      rgba(212,43,43,0.04) 41px
    );
    pointer-events: none;
  }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    z-index: 2;
  }

  .nav-logo {
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--mid);
    line-height: 1.6;
  }

  .nav-logo span {
    display: block;
    color: var(--red);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--mid);
  }

  .nav-links a {
    color: inherit;
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover {
    color: var(--white);
  }

  .hero-main {
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
    padding: 4rem 0 2rem;
  }

  .hero-eyebrow {
    font-size: 0.6rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 3rem;
    height: 1px;
    background: var(--red);
  }

  .hero-title {
    font-size: clamp(5rem, 16vw, 14rem);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    color: var(--white);
    position: relative;
  }

  .hero-title .far {
    display: block;
    -webkit-text-stroke: 2px var(--white);
    color: transparent;
  }

  .hero-title .con {
    display: block;
    color: var(--white);
  }

  .hero-title .year {
    display: block;
    font-size: clamp(2rem, 6vw, 5rem);
    letter-spacing: 0.15em;
    color: var(--gold);
    -webkit-text-stroke: 0;
    margin-top: 0.5rem;
  }

  /* Large geometric circle */
  .hero-circle {
    position: absolute;
    right: -5%;
    top: 50%;
    transform: translateY(-50%);
    width: clamp(300px, 45vw, 600px);
    height: clamp(300px, 45vw, 600px);
    border-radius: 50%;
    border: 1px solid rgba(245,240,232,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .hero-circle::before {
    content: '';
    position: absolute;
    inset: 15%;
    border-radius: 50%;
    border: 1px solid rgba(212,43,43,0.2);
  }

  .hero-circle::after {
    content: '';
    position: absolute;
    inset: 32%;
    border-radius: 50%;
    background: var(--red);
    opacity: 0.12;
  }

  .circle-inner-text {
    font-size: 0.5rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.15);
    text-align: center;
    line-height: 2;
  }

  /* Rotating ring text */
  .ring-text {
    position: absolute;
    width: 100%;
    height: 100%;
    animation: spin 30s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .hero-meta {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 2rem;
    border-top: 1px solid rgba(245,240,232,0.1);
    padding-top: 2rem;
    position: relative;
    z-index: 2;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .hero-meta-item label {
    display: block;
    color: var(--mid);
    margin-bottom: 0.4rem;
    font-size: 0.52rem;
  }

  .hero-meta-item strong {
    color: var(--white);
    font-weight: 400;
    font-size: 0.72rem;
  }

  /* ─── MARQUEE ─── */
  .marquee-wrap {
    background: var(--red);
    padding: 0.9rem 0;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(0,0,0,0.3);
  }

  .marquee-track {
    display: inline-block;
    animation: marquee 18s linear infinite;
  }

  .marquee-track span {
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--black);
    padding: 0 3rem;
    font-weight: 700;
  }

  .marquee-track span::before {
    content: '◆';
    margin-right: 3rem;
    opacity: 0.5;
  }

  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ─── SECTIONS ─── */
  section {
    padding: 6rem 3rem;
    border-bottom: 1px solid rgba(245,240,232,0.08);
  }

  .section-label {
    font-size: 0.55rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 3rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(245,240,232,0.1);
  }

  /* ─── ABOUT ─── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6rem;
    align-items: start;
  }

  .about-headline {
    font-size: clamp(2rem, 4vw, 3.5rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.03em;
    text-transform: uppercase;
  }

  .about-headline em {
    font-style: normal;
    color: var(--red);
  }

  .about-body {
    font-size: 0.75rem;
    line-height: 2;
    color: rgba(245,240,232,0.55);
    margin-top: 1.5rem;
    max-width: 38ch;
  }

  .about-right {
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .stat-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1.5rem;
    align-items: baseline;
    padding-bottom: 2rem;
    border-bottom: 1px solid rgba(245,240,232,0.08);
  }

  .stat-number {
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .stat-desc {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    line-height: 1.8;
  }

  /* ─── SPEAKERS ─── */
  .speakers-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
    margin-top: 1rem;
  }

  .speaker-card {
    border: 1px solid rgba(245,240,232,0.08);
    padding: 2rem 1.5rem;
    position: relative;
    transition: border-color 0.3s, background 0.3s;
    cursor: default;
  }

  .speaker-card:hover {
    border-color: var(--red);
    background: rgba(212,43,43,0.04);
  }

  .speaker-card::before {
    content: attr(data-num);
    position: absolute;
    top: 1rem;
    right: 1.5rem;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    color: rgba(245,240,232,0.15);
  }

  .speaker-avatar {
    width: 3.5rem;
    height: 3.5rem;
    background: rgba(245,240,232,0.05);
    border: 1px solid rgba(245,240,232,0.1);
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    color: rgba(245,240,232,0.2);
  }

  /* Geometric avatars using CSS */
  .speaker-card:nth-child(1) .speaker-avatar {
    background: linear-gradient(135deg, #1a0a0a 0%, #4a1515 100%);
  }
  .speaker-card:nth-child(2) .speaker-avatar {
    background: linear-gradient(135deg, #0a1a0a 0%, #1a3a2a 100%);
  }
  .speaker-card:nth-child(3) .speaker-avatar {
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a4a 100%);
  }
  .speaker-card:nth-child(4) .speaker-avatar {
    background: linear-gradient(135deg, #1a1205 0%, #3a2a0a 100%);
  }

  .speaker-name {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 0.4rem;
    line-height: 1.3;
  }

  .speaker-role {
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 1rem;
  }

  .speaker-topic {
    font-size: 0.62rem;
    color: var(--gold);
    line-height: 1.7;
    letter-spacing: 0.05em;
  }

  /* ─── SCHEDULE ─── */
  .schedule-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .schedule-item {
    display: grid;
    grid-template-columns: 6rem 3rem 1fr auto;
    align-items: center;
    gap: 2rem;
