<meta property="og:title" content="a minimal stat card — big number 42, label designs shipped, dark background, monospace">
<meta property="og:description" content="made with canvas — tag @redeyrie">
<meta property="og:image" content="https://canvas.slash.red/og.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stat Card</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  .card {
    background: #111111;
    border: 1px solid #1f1f1f;
    border-radius: 4px;
    padding: 48px 56px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    width: 480px;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #333333 30%, #333333 70%, transparent);
    border-radius: 4px 4px 0 0;
  }

  .accent {
    width: 24px;
    height: 2px;
    background: #e5e5e5;
    border-radius: 1px;
  }

  .number {
    font-size: 240px;
    font-weight: 700;
    color: #e02020;
    line-height: 1;
    letter-spacing: -12px;
    font-variant-numeric: tabular-nums;
  }

  .label {
    font-size: 11px;
    font-weight: 400;
    color: #555555;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: #1a1a1a;
    margin: 4px 0;
  }

  .meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #2a6e2a;
    box-shadow: 0 0 6px #2a6e2a;
  }

  .meta-text {
    font-size: 10px;
    color: #3a3a3a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="accent"></div>
    <div class="number">42</div>
    <div class="divider"></div>
    <div class="label">designs shipped</div>
    <div class="meta">
      <div class="dot"></div>
      <span class="meta-text">all time</span>
    </div>
  </div>
</body>
</html>
