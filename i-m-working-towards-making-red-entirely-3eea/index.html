<!doctype html>
<html lang="en">
<head>
<meta property="og:title" content="a landing page for 'Farcon 2027', a conference in Buenos Aires, South American graphic des">
<meta property="og:description" content="made with canvas — tag @redmake">
<meta property="og:image" content="https://canvas.slash.red/og.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://canvas.slash.red/og.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farcon 2027 — Buenos Aires</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amarillo: #F5E642;
    --rojo: #E8231A;
    --azul: #1A2BE8;
    --celeste: #5BC8F5;
    --negro: #0D0D0D;
    --blanco: #F7F4EE;
    --verde: #2ECC71;
    --naranja: #FF6B35;
  }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--negro);
    color: var(--blanco);
    font-family: 'Arial Black', 'Arial Bold', Arial, 'Helvetica Neue', Helvetica, sans-serif;
    overflow-x: hidden;
  }

  /* ===== NOISE TEXTURE OVERLAY ===== */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  /* ===== HERO ===== */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
    overflow: hidden;
    background-color: var(--negro);
  }

  /* Diagonal split background */
  .hero::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo) 38%, transparent 38%);
    z-index: 0;
    clip-path: polygon(0 0, 55% 0, 30% 100%, 0 100%);
  }

  /* Geometric accent shapes */
  .hero-shape-1 {
    position: absolute;
    bottom: -60px; right: -60px;
    width: 420px; height: 420px;
    border: 40px solid var(--amarillo);
    border-radius: 50%;
    z-index: 1;
    opacity: 0.85;
  }

  .hero-shape-2 {
    position: absolute;
    top: 40px; right: 220px;
    width: 80px; height: 80px;
    background: var(--celeste);
    z-index: 2;
    transform: rotate(45deg);
  }

  .hero-shape-3 {
    position: absolute;
    bottom: 120px; left: 260px;
    width: 120px; height: 8px;
    background: var(--amarillo);
    z-index: 2;
  }

  .hero-shape-4 {
    position: absolute;
    top: 200px; right: 80px;
    width: 0; height: 0;
    border-left: 60px solid transparent;
    border-right: 60px solid transparent;
    border-bottom: 104px solid var(--verde);
    z-index: 2;
    opacity: 0.9;
  }

  .hero-shape-5 {
    position: absolute;
    top: 0; right: 0;
    width: 180px; height: 180px;
    background: var(--azul);
    z-index: 0;
    clip-path: polygon(100% 0, 0 0, 100% 100%);
  }

  .hero-stripe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: repeating-linear-gradient(90deg,
      var(--amarillo) 0px, var(--amarillo) 80px,
      var(--rojo) 80px, var(--rojo) 160px,
      var(--azul) 160px, var(--azul) 240px,
      var(--celeste) 240px, var(--celeste) 320px,
      var(--verde) 320px, var(--verde) 400px,
      var(--naranja) 400px, var(--naranja) 480px
    );
    z-index: 10;
  }

  /* NAV */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 48px 0;
    position: relative;
    z-index: 10;
  }

  .nav-logo {
    font-size: 13px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--blanco);
    font-weight: 900;
    line-height: 1.3;
  }

  .nav-logo span {
    display: block;
    font-size: 10px;
    letter-spacing: 0.5em;
    color: var(--amarillo);
    font-weight: 700;
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    color: var(--blanco);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 900;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--amarillo); }

  .nav-cta {
    background: var(--amarillo);
    color: var(--negro) !important;
    padding: 10px 22px;
    letter-spacing: 0.2em !important;
  }

  .nav-cta:hover {
    background: var(--rojo);
    color: var(--blanco) !important;
  }

  /* HERO CONTENT */
  .hero-content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 48px 40px;
    max-width: 900px;
  }

  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--amarillo);
    font-weight: 900;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hero-eyebrow::before {
    content: '';
    display: inline-block;
    width: 40px;
    height: 3px;
    background: var(--amarillo);
  }

  .hero-title {
    font-size: clamp(72px, 12vw, 160px);
    line-height: 0.88;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    color: var(--blanco);
    position: relative;
  }

  .hero-title .line-red {
    color: var(--rojo);
    display: block;
    -webkit-text-stroke: 3px var(--rojo);
  }

  .hero-title .line-outline {
    display: block;
    color: transparent;
    -webkit-text-stroke: 3px var(--blanco);
  }

  .hero-title .line-yellow {
    display: block;
    color: var(--amarillo);
  }

  .hero-sub {
    margin-top: 32px;
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--blanco);
    font-weight: 700;
    max-width: 460px;
    line-height: 1.8;
    opacity: 0.85;
  }

  .hero-meta {
    margin-top: 40px;
    display: flex;
    gap: 48px;
    align-items: flex-end;
  }

  .meta-block {}

  .meta-label {
    font-size: 9px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--celeste);
    font-weight: 900;
    margin-bottom: 4px;
  }

  .meta-value {
    font-size: 18px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 900;
    color: var(--blanco);
  }

  .hero-cta-group {
    margin-top: 48px;
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .btn-primary {
    background: var(--amarillo);
    color: var(--negro);
    padding: 18px 44px;
    font-size: 12px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-weight: 900;
    text-decoration: none;
    display: inline-block;
    font-family: inherit;
    transition: background 0.2s, color 0.2s;
    border: 3px solid var(--amarillo);
  }

  .btn-primary:hover {
    background: transparent;
    color: var(--amarillo);
  }

  .btn-secondary {
    color: var(--blanco);
    padding: 18px 44px;
    font-size: 12px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-weight: 900;
    text-decoration: none;
    display: inline-block;
    border: 3px solid var(--blanco);
    transition: background 0.2s, color 0.2s;
  }

  .btn-secondary:hover {
    background: var(--blanco);
    color: var(--negro);
  }

  /* HERO BOTTOM BAR */
  .hero-bottom {
    position: relative;
    z-index: 10;
    background: var(--amarillo);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 48px;
    overflow: hidden;
  }

  .ticker {
    display: flex;
    gap: 64px;
    align-items: center;
    white-space: nowrap;
  }

  .ticker-item {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 900;
    color: var(--negro);
  }

  .ticker-sep {
    font-size: 20px;
    color: var(--rojo);
    font-weight: 900;
    line-height: 1;
  }

  /* ===== SECTIONS ===== */
  section { position: relative; }

  .section-stripe {
    height: 6px;
    background: repeating-linear-gradient(90deg,
      var(--rojo) 0px, var(--rojo) 60px,
      var(--negro) 60px, var(--negro) 120px
    );
  }

  /* ABOUT */
  .about {
    background: var(--blanco);
    color: var(--negro);
    padding: 100px 48px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .about-left {}

  .section-label {
    font-size: 10px;
    letter-spacing: 0.55em;
    text-transform: uppercase;
    font-weight: 900;
    color: var(--rojo);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::before {
    content: '';
    display: inline-block;
    width: 30px;
    height: 3px;
    background: var(--rojo);
  }

  .about-heading {
    font-size: clamp(36px, 5vw, 64px);
    line-height: 0.95;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--negro);
    letter-spacing: -0.02em;
  }

  .about-heading em {
    font-style: normal;
    color: var(--rojo);
  }

  .about-right {}

  .about-body {
    font-size: 15px;
    line-height: 1.8;
    font-weight: 700;
    color: #333;
    letter-spacing: 0.02em;
    margin-bottom: 32px;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 400;
  }

  .about-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 40px;
  }

  .stat-box {
    background: var(--negro);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .stat-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--amarillo);
  }

  .stat-number {
    font-size: 40px;
    font-weight: 900;
    color: var(--amarillo);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--blanco);
    font-weight: 700;
    margin-top: 6px;
  }

  /* ABOUT VISUAL */
  .about-visual {
    position: relative;
    height: 440px;
  }

  .av-block {
    position: absolute;
    font-weight: 900;
    text-transform: uppercase;
  }

  .av-big {
    font-size: 180px;
    line-height: 1;
    color: var(--rojo);
    opacity: 0.08;
    top: -20px; left: -20px;
    letter-spacing: -0.05em;
  }

  .av-card {
    position: absolute;
    background: var(--negro);
    color: var(--blanco);
    padding: 32px;
    width: 280px;
  }

  .av-card-1 {
    top: 40px; left: 20px;
  }

  .av-card-2 {
    bottom: 20px; right: 0;
    background: var(--rojo);
    width: 220px;
  }

  .av-card-title {
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--amarillo);
    margin-bottom: 8px;
  }

  .av-card-2 .av-card-title {
    color: var(--negro);
  }

  .av-card-text {
    font-size: 22px;
    line-height: 1.2;
    font-weight: 900;
    text-transform: uppercase;
  }

  .av-line {
    position: absolute;
    top: 0; right: 100px;
    width: 3px; height: 100%;
    background: var(--amarillo);
    opacity: 0.3;
  }

  /* SPEAKERS */
  .speakers {
    background: var(--negro);
    padding: 100px 48px;
  }

  .speakers-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 64px;
  }

  .speakers-heading {
    font-size: clamp(40px, 6vw, 80px);
    line-height: 0.9;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    color: var(--blanco);
  }

  .speakers-heading span {
    display: block;
    color: transparent;
    -webkit-text-stroke: 2px var(--amarillo);
  }

  .speakers-note {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--celeste);
    font-weight: 900;
    text-align: right;
    line-height: 1.8;
  }

  .speakers-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
  }

  .speaker-card {
    background: #1a1a1a;
    padding: 0;
    position: relative;
    overflow: hidden;
    aspect-ratio: 3/4;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .speaker-avatar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 75%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.05em;
    line-height: 1;
  }

  .sc1 { background: var(--rojo); color: var(--amarillo); }
  .sc2 { background: var(--azul); color: var(--celeste); }
  .sc3 { background: #222; color: var(--verde); }
  .sc4 { background: var(--naranja); color: var(--negro); }

  .speaker-info {
    background: var(--negro);
    padding: 20px 20px 24px;
    position: relative;
    z-index: 2;
  }

  .speaker-name {
    font-size: 16px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--blanco);
    line-height: 1.1;
  }

  .speaker-role {
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--amarillo);
    font-weight: 700;
    margin-top: 4px;
  }

  .speaker-country {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #666;
    font-weight: 700;
    margin-top: 2px;
  }

  .speaker-tag {
    position: absolute;
    top: 20px; right: 20px;
    background: var(--amarillo);
    color: var(--negro);
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 900;
    padding: 4px 10px;
    z-index: 5;
  }

  /* PROGRAM */
  .program {
    background: var(--amarillo);
    padding: 100px 48px;
  }

  .program-header {
    margin-bottom: 60px;
  }

  .program-heading {
    font-size: clamp(40px, 6vw, 80px);
    line-height: 0.9;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    color: var(--negro);
  }

  .program-heading span {
    color: var(--rojo);
  }

  .program-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
  }

  .program-day {
    background: var(--negro);
    padding: 48px 40px;
  }

  .day-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
    border-bottom: 2px solid #333;
    padding-bottom: 24px;
  }

  .day-number {
    font-size: 64px;
    font-weight: 900;
    line-height: 1;
    color: var(--amarillo);
    letter-spacing: -0.04em;
  }

  .day-info {}

  .day-name {
    font-size: 18px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--blanco);
  }

  .day-date {
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--celeste);
    font-weight: 700;
  }

  .schedule-item {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    align-items: flex-start;
  }

  .sched-time {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rojo);
    font-weight: 900;
    width: 80px;
    flex-shrink: 0;
    padding-top: 3px;
  }

  .sched-content {}

  .sched-title {
    font-size: 14px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--blanco);
    line-height: 1.2;
  }

  .sched-speaker {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--amarillo);
    font-weight: 700;
    margin-top: 3px;
  }

  .sched-tag {
    display: inline-block;
    background: var(--rojo);
    color: var(--blanco);
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 900;
    padding: 2px 8px;
    margin-top: 6px;
  }

  /* VENUE */
  .venue {
    background: #111;
    padding: 100px 48px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .venue-left {}

  .venue-heading {
    font-size: clamp(40px, 5vw, 72px);
    line-height: 0.9;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    color: var(--blanco);
    margin-bottom: 32px;
  }

  .venue-heading em {
    font-style: normal;
    color: var(--celeste);
    display: block;
  }

  .venue-body {
    font-size: 14px;
    line-height: 1.8;
    color: #aaa;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 400;
    margin-bottom: 40px;
  }

  .venue-details {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .venue-detail {
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid #222;
    padding-bottom: 16px;
  }

  .vd-icon {
    width: 40px; height: 40px;
    background: var(--azul);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    font-weight: 900;
    color: var(--blanco);
  }

  .vd-label {
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--celeste);
    font-weight: 900;
  }

  .vd-value {
    font-size: 14px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--blanco);
    margin-top: 2px;
  }

  /* Venue visual map-like block */
  .venue-right {
    position: relative;
  }

  .venue-map {
    background: #1a1a1a;
    aspect-ratio: 1;
    position: relative;
    overflow: hidden;
    border: 3px solid #222;
  }

  .map-grid {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(#333 1px, transparent 1px),
      linear-gradient(90deg, #333 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
  }

  .map-block {
    position: absolute;
    background: var(--azul);
    opacity: 0.6;
  }

  .map-block-2 {
    position: absolute;
    background: #444;
  }

  .map-pin {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    text-align: center;
  }

  .map-pin-dot {
    width: 24px; height: 24px;
    background: var(--rojo);
    border-radius: 50%;
    margin: 0 auto;
    border: 4px solid var(--blanco);
    position: relative;
    z-index: 2;
  }

  .map-pin-label {
    background: var(--rojo);
    color: var(--blanco);
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 900;
    padding: 4px 10px;
    margin-top: 8px;
    white-space: nowrap;
  }

  .map-street-h {
    position: absolute;
    height: 6px;
    background: #555;
  }

  .map-street-v {
    position: absolute;
    width: 6px;
    background: #555;
  }

  /* TICKETS */
  .tickets {
    background: var(--rojo);
    padding: 100px 48px;
  }

  .tickets-header {
    text-align: center;
    margin-bottom: 64px;
  }

  .tickets-heading {
    font-size: clamp(48px, 7vw, 96px);
    line-height: 0.88;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    color: var(--blanco);
  }

  .tickets-heading span {
    display: block;
    color: var(--amarillo);
  }

  .tickets-sub {
    font-size: 11px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    font-weight: 700;
    margin-top: 16px;
  }
