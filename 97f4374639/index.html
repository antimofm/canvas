<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas — Coming Soon</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #0d0d0d;
    --surface: #111111;
    --red: #e02020;
    --red-dim: #a01515;
    --text: #c8c8c8;
    --text-dim: #4a4a4a;
    --text-faint: #282828;
    --mono: 'Courier New', Courier, monospace;
  }

  html, body {
    height: 100%;
    width: 100%;
  }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--text-faint) 1px, transparent 1px),
      linear-gradient(90deg, var(--text-faint) 1px, transparent 1px);
    background-size: 64px 64px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, var(--bg) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .wrapper {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    max-width: 680px;
    width: 100%;
  }

  /* Top label */
  .label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 72px;
  }

  .label span {
    color: var(--red);
  }

  /* Wordmark */
  .wordmark {
    display: block;
    font-size: clamp(52px, 10vw, 96px);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
    margin-bottom: 4px;
    position: relative;
  }

  /* Red accent bar under wordmark */
  .accent-line {
    display: block;
    width: 40px;
    height: 3px;
    background-color: var(--red);
    margin-bottom: 56px;
  }

  /* Tagline */
  .tagline {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-dim);
    max-width: 380px;
    margin-bottom: 80px;
    letter-spacing: 0.04em;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, var(--text-faint) 0%, transparent 100%);
    margin-bottom: 48px;
  }

  /* Notify section */
  .notify-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .notify-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    width: 100%;
    max-width: 400px;
  }

  .notify-input {
    flex: 1;
    background: transparent;
    border: 1px solid var(--text-faint);
    border-right: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 13px 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .notify-input::placeholder {
    color: var(--text-dim);
  }

  .notify-input:focus {
    border-color: var(--red-dim);
  }

  .notify-btn {
    background: var(--red);
    border: 1px solid var(--red);
    color: #fff;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 13px 20px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .notify-btn:hover {
    background: var(--red-dim);
    border-color: var(--red-dim);
  }

  /* Bottom metadata */
  .meta {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 32px;
    width: 100%;
    max-width: 680px;
    padding: 0 24px;
    justify-content: space-between;
  }

  .meta-item {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .meta-item span {
    color: var(--red);
  }

  /* Corner decoration */
  .corner {
    position: fixed;
    z-index: 2;
    width: 20px;
    height: 20px;
    opacity: 0.35;
  }

  .corner--tl {
    top: 24px;
    left: 24px;
    border-top: 1px solid var(--red);
    border-left: 1px solid var(--red);
  }

  .corner--br {
    bottom: 24px;
    right: 24px;
    border-bottom: 1px solid var(--red);
    border-right: 1px solid var(--red);
  }
</style>
</head>
<body>

  <div class="corner corner--tl"></div>
  <div class="corner corner--br"></div>

  <div class="wrapper">

    <p class="label"><span>●</span>&nbsp;&nbsp;RED / Design Engine&nbsp;&nbsp;—&nbsp;&nbsp;001</p>

    <h1 class="wordmark">Canvas</h1>
    <span class="accent-line"></span>

    <p class="tagline">
      A design engine built for precision.<br>
      Minimal by intent. Expressive by nature.<br>
      Coming when it's ready.
    </p>

    <div class="divider"></div>

    <p class="notify-label">Notify me on launch</p>

    <div class="notify-row">
      <input class="notify-input" type="email" placeholder="your@email.com" autocomplete="off" spellcheck="false">
      <button class="notify-btn">Send</button>
    </div>

  </div>

  <div class="meta">
    <span class="meta-item">Canvas <span>v0.0</span></span>
    <span class="meta-item">— &nbsp; Soon</span>
    <span class="meta-item"><span>©</span> RED</span>
  </div>

</body>
</html>
