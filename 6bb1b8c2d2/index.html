<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CANVAS</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    background-color: #000000;
    color: #00ff41;
    font-family: "Courier New", Courier, "Lucida Console", monospace;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .terminal-frame {
    border: 1px solid #00ff41;
    padding: 3rem 4rem;
    position: relative;
    box-shadow:
      0 0 8px #00ff41,
      0 0 24px rgba(0, 255, 65, 0.3),
      inset 0 0 40px rgba(0, 255, 65, 0.04);
  }

  .terminal-frame::before {
    content: "CANVAS // RED DESIGN ENGINE";
    position: absolute;
    top: -0.65em;
    left: 2rem;
    background: #000000;
    padding: 0 0.75rem;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: #00ff41;
    opacity: 0.75;
  }

  .terminal-frame::after {
    content: "v1.0.0";
    position: absolute;
    bottom: -0.65em;
    right: 2rem;
    background: #000000;
    padding: 0 0.75rem;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: #00ff41;
    opacity: 0.5;
  }

  .banner {
    display: block;
    font-size: clamp(0.55rem, 1.4vw, 1rem);
    line-height: 1.2;
    letter-spacing: 0;
    white-space: pre;
    color: #00ff41;
    text-shadow:
      0 0 6px #00ff41,
      0 0 16px rgba(0, 255, 65, 0.6);
  }

  .scanline-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    z-index: 10;
  }
</style>
</head>
<body>
<div class="scanline-overlay"></div>
<div class="terminal-frame">
<pre class="banner">
 ____    _    _   ___     ___    ____  
/ ___|  / \  | \ | \ \   / / \  / ___| 
| |     / _ \ |  \| |\ \ / / _ \ \___ \ 
| |___ / ___ \| |\  | \ V / ___ \ ___) |
 \____/_/   \_\_| \_|  \_/_/   \_\____/ 
                                        
</pre>
</div>
</body>
</html>
